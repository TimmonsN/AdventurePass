<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="src/style.css">
        <script type="module" src="/src/main.js"></script>
    </head>
    <body id="body">
        <div class="container">
            <div class="text">
                <h1>AdventurePass</h1>
                <form action="/search">
                    <input type="text" placeholder="Where to?" id="destination" enterkeyhint="search">
                </form>
            </div> 
            <p class="compass" id="compass"></p>
            <div class="boxbox">
                <div class="arrowbox">
                    <svg class="arrow" id="arrow" viewBox="0 0 124 126" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path opacity="1" d="M53.4395 5.0407C56.7319 -1.68022 66.3118 -1.68024 69.6042 5.04069L122.087 112.176C125.922 120.004 117.499 128.167 109.794 124.09L65.7318 100.77C63.0982 99.3761 59.9455 99.3761 57.3119 100.77L13.2493 124.09C5.54422 128.167 -2.87801 120.004 0.957055 112.176L53.4395 5.0407Z" fill="#dfdbe6"/>
                    </svg>
                    <svg class="circle hidden" id="circle" width="146" height="149" viewBox="0 0 146 149" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <ellipse cx="73" cy="74.5" rx="73" ry="74.5" fill="#D9D9D9"/>
                    </svg>
                </div>
            </div>
            <button class="button" id="button">Exit</button>  
          </div>
    </body>
</html>
